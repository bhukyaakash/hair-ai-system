version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hair_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
