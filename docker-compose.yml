version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hair_ai_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-hairai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hairai_password}
      POSTGRES_DB: ${DB_NAME:-hair_ai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hairai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hair_ai_network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: hair_ai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hair_ai_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hair_ai_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hairai_user}:${DB_PASSWORD:-hairai_password}@postgres:5432/${DB_NAME:-hair_ai_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/app/ml/saved_models:/app/ml/saved_models
    command: python main.py
    networks:
      - hair_ai_network

  # Frontend (Optional - if using Node.js React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hair_ai_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - hair_ai_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hair_ai_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hair_ai_network

volumes:
  postgres_data:
    driver: local

networks:
  hair_ai_network:
    driver: bridge
