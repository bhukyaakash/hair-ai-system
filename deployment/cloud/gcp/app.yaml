"""Google Cloud Run Deployment Configuration"""
runtime: python310
entrypoint: gunicorn -w 4 -b 0.0.0.0:8000 app.main:app

env:
  - name: ENVIRONMENT
    value: production
  - name: LOG_LEVEL
    value: INFO

env_variables:
  BACKEND_WORKERS: "4"

automatic_scaling:
  max_instances: 100
  min_instances: 1

inbound_services:
  - cloud_run
