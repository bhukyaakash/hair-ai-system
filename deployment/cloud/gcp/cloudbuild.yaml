"""Google Cloud Build Configuration"""
steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hair-ai-backend:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hair-ai-backend:$COMMIT_SHA'
      - './backend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/hair-ai-backend'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '-f=deployment/cloud/gcp/'
      - '-i'
      - 'gcr.io/$PROJECT_ID/hair-ai-backend:$COMMIT_SHA'
      - '-o'
      - '/workspace/output'

images:
  - 'gcr.io/$PROJECT_ID/hair-ai-backend:latest'
  - 'gcr.io/$PROJECT_ID/hair-ai-backend:$COMMIT_SHA'
